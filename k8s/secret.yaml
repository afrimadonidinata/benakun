# WARNING: Replace ALL placeholder values before deploying to any non-local
# environment.  Consider managing this file with a secrets manager (e.g.
# Vault, AWS Secrets Manager, Sealed Secrets) rather than committing real
# credentials to source control.
#
# Quick alternative:
#   kubectl create secret generic benakun-secret \
#     --namespace benakun --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: benakun-secret
  namespace: benakun
type: Opaque
stringData:
  # Tarantool credentials (must match TARANTOOL_USER_NAME / _PASSWORD in tarantool.yaml)
  TARANTOOL_USER: "benakunT"
  TARANTOOL_PASS: "benakunPT"

  # ClickHouse credentials (must match CLICKHOUSE_USER / CLICKHOUSE_PASSWORD in clickhouse.yaml)
  CLICKHOUSE_USER: "benakunC"
  CLICKHOUSE_PASS: "benakunPC"

  # Comma-separated list of superadmin email addresses
  SUPERADMIN_EMAILS: ""

  # Google OAuth (leave empty to disable Google login)
  OAUTH_GOOGLE_CLIENT_ID: ""
  OAUTH_GOOGLE_CLIENT_SECRET: ""

  # Only required when MAILER_DEFAULT=dockermailserver
  DOCKERMAILSERVER_HOST: ""
  DOCKERMAILSERVER_PORT: "587"
  DOCKERMAILSERVER_USER: ""
  DOCKERMAILSERVER_PASS: ""
