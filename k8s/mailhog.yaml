# Mailhog — development SMTP trap.
# For production, remove this manifest, set MAILER_DEFAULT=dockermailserver in
# the ConfigMap, and fill the DOCKERMAILSERVER_* keys in the Secret.
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: benakun
  labels:
    app.kubernetes.io/name: mailhog
spec:
  selector:
    app.kubernetes.io/name: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
      protocol: TCP
    - name: ui
      port: 8025
      targetPort: 8025
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: benakun
  labels:
    app.kubernetes.io/name: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mailhog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:latest
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: ui
              containerPort: 8025
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 1025
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
