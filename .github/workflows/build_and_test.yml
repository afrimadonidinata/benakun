name: Build and Test
'on':
  workflow_dispatch: null
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  Go-Setup:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Go
        uses: actions/setup-go@v4
      - run: |
          make setup
          go mod tidy
      
  Go-Build:
    timeout-minutes: 10
    needs: Go-Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - run: go build -v ./...

  Docker-Build-and-Push:
    timeout-minutes: 30
    needs: Go-Build
    runs-on: ubuntu-latest
    # Only push on commits to master, not on PRs from forks (no GITHUB_TOKEN
    # write access in that context).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/afrimadonidinata/benakun:latest
            ghcr.io/afrimadonidinata/benakun:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  Go-Test:
    timeout-minutes: 30
    needs: Go-Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Create .env.override
        uses: 1arp/create-a-file-action@0.3
        with:
          file: '.env.override'
      - run: go test -v ./...
  Go-Test-Coverage:
    timeout-minutes: 30
    needs: Go-Setup
    runs-on: ubuntu-latest
    steps:
      - run: go test -coverprofile=coverage.txt -covermode=atomic ./... && go tool cover -html=coverage.txt -o coverage.html        
  Svelte-Test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - working-directory: ./svelte
        run: |
          npm install
          node build.js
        